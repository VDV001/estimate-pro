services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: estimatepro
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  gotenberg:
    image: gotenberg/gotenberg:8
    command:
      - "gotenberg"
      - "--api-port=3000"
      - "--api-timeout=300s"
    ports:
      - "3001:3000"
    # gotenberg/gotenberg:8 ships on distroless without
    # curl/wget/bash; relying on /dev/tcp inside the container is
    # not portable. We omit the healthcheck and rely on the GotenbergConverter's
    # 5xx → ErrGotenbergUnavailable mapping for runtime visibility.

  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://user:password@postgres:5432/estimatepro?sslmode=disable
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: estimatepro
      S3_USE_SSL: "false"
      JWT_SECRET: your-secret-key-change-in-production
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 720h
      SERVER_PORT: "8080"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      OAUTH_REDIRECT_BASE_URL: ${OAUTH_REDIRECT_BASE_URL:-http://localhost:3000}
      COMPOSIO_API_KEY: ${COMPOSIO_API_KEY:-}
      COMPOSIO_GMAIL_ACCOUNT_ID: ${COMPOSIO_GMAIL_ACCOUNT_ID:-}
      COMPOSIO_TELEGRAM_ACCOUNT_ID: ${COMPOSIO_TELEGRAM_ACCOUNT_ID:-}
      GOTENBERG_URL: ${GOTENBERG_URL:-http://gotenberg:3000}
      GOTENBERG_TIMEOUT: ${GOTENBERG_TIMEOUT:-5m}
    depends_on:
      - postgres
      - redis
      - minio
      - gotenberg

volumes:
  postgres_data:
  redis_data:
  minio_data:
